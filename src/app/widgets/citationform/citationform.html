<div class="citation-form-container compact">
  <div class="top-row">
    <app-pubmed (citationRetrieved)="onCitationReceived($event)"></app-pubmed>
    
    <mat-form-field appearance="outline" class="note-field">
      <mat-label>Note</mat-label>
      <input matInput [(ngModel)]="working.note" placeholder="Quick note...">
    </mat-form-field>
  </div>

  @if (working.citation.title) {
    <div class="mini-preview">
      <mat-icon>check_circle</mat-icon>
      <span class="truncate">{{ working.citation.title }}</span>
    </div>
  }

  <div class="evidence-list">
    @for (field of evidenceFields; track field) {
      <div class="evidence-row">
        <span class="row-label">{{ field.replace('Evidence', '') | titlecase }}</span>
        
        <div class="segmented-control">
          @for (option of evidenceOptions; track option.value) {
            <button
              type="button"
              class="segment-btn"
              [class.active]="working[field] === option.value"
              (click)="working[field] = option.value">
              {{ option.label }}
            </button>
          }
        </div>
      </div>
    }
  </div>

  <div class="compact-actions">
    <button mat-button color="warn" (click)="onCancel()">Cancel</button>
    <button mat-flat-button color="primary" (click)="onSave()">Save Entry</button>
  </div>
</div>
