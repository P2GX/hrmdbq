@if (!stepComplete()) {
<div>
  <h3>Citations ({{ citations().length }})</h3>

  @for (c of citations(); track $index) {
    <div>
      <strong>{{ c.citation.title || c.citation.pmid }}</strong>
      <span> | Seg: {{ c.cosegregationEvidence }}</span>
      <span> | Pheno: {{ c.phenotypicEvidence }}</span>

      <button (click)="  onEdit($index)">Edit</button>
      <button (click)="onDelete($index)">Delete</button>
    </div>
  }

  <button class="btn-action" (click)="onAdd()">
    <span>➕</span> Add Citation
  </button>

  <button class="btn-action primary" (click)="onFinish()">
    Finish
  </button>
</div>
} @else {
    <div class="confirmed-badge">
    <div class="data-info">
      <mat-icon class="success-icon">check_circle</mat-icon>
      <span class="label">Citations:</span>
      <strong>{{ citationDisplay() }}</strong>
    </div>
  
    <button mat-icon-button color="warn" (click)="cancel()" matTooltip="Reset and Edit">
      <mat-icon>restart_alt</mat-icon>
    </button>
  </div>   
}
