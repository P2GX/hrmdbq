<div>
  <h3>Citations ({{ citations().length }})</h3>

  @for (c of citations(); track $index) {
    <div>
      <strong>{{ c.citation.title || c.citation.pmid }}</strong>
      <span> | Seg: {{ c.cosegregationEvidence }}</span>
      <span> | Pheno: {{ c.phenotypicEvidence }}</span>

      <button (click)="  onEdit($index)">Edit</button>
      <button (click)="onDelete($index)">Delete</button>
    </div>
  }

  <button (click)="onAdd()">➕ Add Citation</button>
</div>
