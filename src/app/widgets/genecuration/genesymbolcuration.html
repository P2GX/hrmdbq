<div class="curation-widget-container">
    <p class="widget-title">Gene Selection</p>

    @if (hgncId()) {
        <div class="confirmed-badge">
            <div class="data-info">
                <mat-icon class="success-icon">check_circle</mat-icon>
                <span class="label">Gene:</span>
                <strong>{{ geneSymbol() }}</strong>
                <span class="label">HGNC</span>
                <strong>{{ hgncId() }}</strong>
                <span class="label">MANE transcript</span>
                <strong>{{ maneTranscriptId() }}</strong>
            </div>
            
            <button mat-icon-button color="warn" (click)="onReset()" matTooltip="Reset and Edit">
                <mat-icon>restart_alt</mat-icon>
            </button>
        </div>
    } @else {
        <section class="search-section">
            <div class="search-row">
                <mat-form-field appearance="outline" class="symbol-input">
                    <mat-label>Gene Symbol</mat-label>
                    <input matInput 
                           [ngModel]="geneSymbol()" 
                           (ngModelChange)="geneSymbol.set($event.toUpperCase())" 
                           placeholder="e.g., FBN1"
                           autocomplete="off"
                           spellcheck="false"
                           (keyup.enter)="onSearchGene()">
                </mat-form-field>

                <div class="action-buttons">
                    <button mat-flat-button color="primary" 
                            (click)="onSearchGene()" 
                            [disabled]="isSearching() || !geneSymbol()">
                        {{ isSearching() ? 'Fetching...' : 'Lookup Gene' }}
                    </button>
                </div>
            </div>
        </section>
    }
</div>
