<div class="curation-widget-container">
    @if (hgncId()) {
        <div class="confirmed-badge">
            <div class="data-info">
                <mat-icon class="success-icon">check_circle</mat-icon>
                <span class="label">Gene:</span>
                <strong>{{ geneSymbol() }}</strong>
                <span class="label">HGNC</span>
                <strong>{{ hgncId() }}</strong>
                <span class="label">MANE transcript</span>
                <strong>{{ maneTranscriptId() }}</strong>
            </div>
    
            <button mat-icon-button 
                color="warn" 
                (click)="onReset()" 
                matTooltip="Reset and Edit"
                class="shrink-0">
                <mat-icon>restart_alt</mat-icon>
            </button>
        </div>
    } @else {
        <section class="search-section">
            <div class="search-row">
               <p>Select a gene for curation from the setup page first.</p>
                <button mat-icon-button 
                color="warn" 
                (click)="onReset()" 
                matTooltip="Reset and Edit"
                class="shrink-0">
                <mat-icon>restart_alt</mat-icon>
            </button>
            </div>
        </section>
    }
</div>
