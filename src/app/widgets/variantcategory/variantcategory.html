<mat-card class="p-4 transition-all" [class.bg-slate-50]="categoryConfirmed()">
  

  @if (!categoryConfirmed()) {
    <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-bold text-slate-500 uppercase tracking-tight">
        Step 3: Variant Category
        </h3>
    </div>
    <div class="category-grid">
        @for (cat of categories; track cat) {
            <button mat-stroked-button 
                    class="category-btn"
                    [class.active-btn]="selectedCategory() === cat"
                    (click)="selectCategory(cat)">
            {{ formatCategoryLabel(cat) }}
            </button>
        }
        </div>
  } @else {
       <div class="confirmed-badge">
            <div class="data-info">
                <mat-icon class="success-icon">check_circle</mat-icon>
                <span class="label">Variant class:</span>
                <strong>{{formatCategoryLabel(selectedCategory()) }}</strong>
            </div>
            <button mat-icon-button color="warn" (click)="categoryConfirmed.set(false)" matTooltip="Reset and Edit">
                <mat-icon>restart_alt</mat-icon>
            </button>
        </div>
  }
</mat-card>
