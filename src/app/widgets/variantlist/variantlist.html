<div class="list-container">
  <div class="header">
    <h3>Variants ({{ totalCount() }})</h3>
    <button (click)="onSelectFile()">Change File</button>
  </div>

  @if (variants().length > 0) {
    <ul>
      @for (item of variants(); track $index) {
        <li>
          {{ item.variantCategory }}: {{ item.variantCoordinates }}
        </li>
      }
    </ul>
  } @else {
    <p class="empty-msg">No variants loaded. Please select a curation file.</p>
  }
</div>
