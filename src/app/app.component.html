<mat-sidenav-container class="sidenav-container" autosize>

    <!-- Sidebar Navigation -->
    <!-- We keep the drawer open at all times, but toggle the 'collapsed' CSS class -->
    <mat-sidenav class="sidenav" [class.collapsed]="isCollapsed()" fixedInViewport="true" mode="side" [opened]="true">

        <!-- Header in Sidebar -->
        <div class="sidenav-header">
            <!-- Burger menu calls toggleMenu() instead of drawer.toggle() -->
            <button mat-icon-button (click)="toggleMenu()" class="menu-button" aria-label="Toggle sidenav">
                <mat-icon>menu</mat-icon>
            </button>

            <div class="logo-title">
                <img src="assets/hrmdbq.svg" alt="HRMDBQ" class="logo-icon" />
                @if (!isCollapsed()) {
                    <h2 class="logo-text">HRMDBQ</h2>
                }
            </div>
        </div>

        <!-- Navigation Menu -->
        <mat-nav-list>
            <a mat-list-item routerLink="/setup" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }"
               class="nav-item">
                <mat-icon matListItemIcon>upload_file</mat-icon>
                <span matListItemTitle>Setup</span>
            </a>
            <a mat-list-item routerLink="/annots" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }"
               class="nav-item">
                <mat-icon matListItemIcon>model_training</mat-icon>
                <span matListItemTitle>Annotations</span>
            </a>

            <a mat-list-item routerLink="/curate" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }"
               class="nav-item">
                <mat-icon matListItemIcon>bar_chart_4_bars</mat-icon>
                <span matListItemTitle>Curation</span>
            </a>
             <mat-divider></mat-divider>
            <a mat-list-item routerLink="/status" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }"
               class="nav-item">
                <mat-icon matListItemIcon>info</mat-icon>
                <span matListItemTitle>Stats</span>
            </a>
            <mat-divider></mat-divider>
            <a mat-list-item routerLink="/about" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }"
               class="nav-item">
                <mat-icon matListItemIcon>info</mat-icon>
                <span matListItemTitle>About</span>
            </a>
        </mat-nav-list>

    </mat-sidenav>

    <!-- Main Content Area -->
    <mat-sidenav-content class="main-content">
        <!-- Floating header is fully removed since the sidebar never fully vanishes -->

        <!-- Page Content -->
        <div class="content">
            <router-outlet></router-outlet>
        </div>

    </mat-sidenav-content>

</mat-sidenav-container>
