<div class="curation-container">
  <div class="header-section">
    <div class="title-group">
      <h1 class="page-title">HRMDBQ</h1>
      <span class="subtitle">Human Regulatory Mutation Database Curation (version {{version()}})</span>
    </div>
  </div>

  <div class="main-layout">
    <div class="side-panel">
      <div class="setup-card">
        <div class="mini-row">
          <span class="mini-label">Curator:</span>
          <code>{{ orcidDisplay() }}</code>
          <button class="icon-btn" (click)="setBiocuratorOrcid()" title="Update ORCID">
            <span class="material-symbols-outlined">fingerprint</span>
          </button>
        </div>

        <div class="mini-row">
          <span class="mini-label">Path:</span>
          <span class="path-truncate">{{ curationDirectoryDisplay() || 'None' }}</span>
          <button class="icon-btn" (click)="onSelectFile()" title="Change Folder">
            <span class="material-symbols-outlined">folder_open</span>
          </button>
        </div>

        <hr class="divider">

       <div class="create-section">
  <label class="section-label">Start New Curation</label>
  <div class="input-group prominent">
    <input #newGeneInput type="text" class="gene-input" placeholder="Gene Symbol (e.g. SHH)" 
           (keyup.enter)="createNewGeneCuration(newGeneInput.value); newGeneInput.value=''">
    <button class="add-btn-prominent" (click)="createNewGeneCuration(newGeneInput.value); newGeneInput.value=''" title="Create new file">
      <span class="material-symbols-outlined">add</span>
    </button>
  </div>
</div>
      </div>
    </div>

    <div class="table-section">
      <div class="table-header">
      <h3 class="table-title">Existing gene curations (n={{ dataSource.data.length }})</h3>
      
      <mat-form-field appearance="outline" class="search-bar compact-field" style="width: 180px;">
        <mat-label>Filter</mat-label>
        <input matInput (keyup)="applyFilter($event)" #input placeholder="e.g. SHH">
        <span matPrefix class="material-symbols-outlined search-icon">search</span>
      </mat-form-field>

      </div>

      <div class="table-wrapper mat-elevation-z1">
        <table mat-table [dataSource]="dataSource">
          <ng-container matColumnDef="symbol">
            <th mat-header-cell *matHeaderCellDef> Gene </th>
            <td mat-cell *matCellDef="let element"><strong>{{element.geneSymbol}}</strong></td>
          </ng-container>

          <ng-container matColumnDef="path">
            <th mat-header-cell *matHeaderCellDef> File </th>
            <td mat-cell *matCellDef="let element" class="path-text">{{element.file}}</td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="['symbol', 'path']; sticky: true"></tr>
          <tr mat-row *matRowDef="let row; columns: ['symbol', 'path'];" (click)="onGeneClick(row)" class="clickable-row"></tr>
        </table>
      </div>
    </div>
  </div>
</div>
