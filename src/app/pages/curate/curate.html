<p>Curation widget</p>

<section class="search-section">
        <div class="search-row">
            <mat-form-field appearance="outline" class="symbol-input">
                <mat-label>Gene Symbol</mat-label>
                <input matInput 
                       [ngModel]="geneSymbol()" 
                       (ngModelChange)="geneSymbol.set($event)" 
                       placeholder="e.g., SON"
                       (keyup.enter)="onSearchGene()">
            </mat-form-field>

            <button mat-flat-button color="primary" 
                    (click)="onSearchGene()" 
                    [disabled]="isSearching() || !geneSymbol()">
                {{ isSearching() ? 'Fetching...' : 'Lookup Gene' }}
            </button>
        </div>

        @if (hgncRawResult()) {
            <div class="result-viewer">
                <h3>HGNC Result</h3>
                <pre>{{ hgncRawResult() }}</pre>
            </div>
        }
    </section>
